<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=240, height=320, initial-scale=1.0"><title>Cloud Phone</title><style>body{    margin:0;    background:#000;    display:flex;    justify-content:center;    align-items:center;    height:100vh;    font-family: Arial, Helvetica, sans-serif;}/* ===== Fixed Screen ===== */.screen{    width:240px;    height:320px;    background:#0f0f0f;    color:#fff;    text-align:center;    padding-top:30px;}/* ===== Logo Circle ===== */.logo{    width:110px;    height:110px;    background:#1aa7ff;    border-radius:50%;    margin:0 auto 15px;    display:flex;    align-items:center;    justify-content:center;    animation:pulse 2s infinite alternate;}/* ===== Cloud Shape ===== */.cloud{    width:70px;    height:32px;    background:#fff;    border-radius:20px;    position:relative;}.cloud:before{    content:'';    width:30px;    height:30px;    background:#fff;    border-radius:50%;    position:absolute;    left:8px;    top:-15px;}.cloud:after{    content:'';    width:40px;    height:40px;    background:#fff;    border-radius:50%;    position:absolute;    right:5px;    top:-22px;}/* ===== Phone ===== */.phone{    width:16px;    height:26px;    border:2px solid #888;    background:#eaeaea;    border-radius:3px;    position:absolute;    left:50%;    top:50%;    transform:translate(-50%,-50%);}/* ===== Text ===== */h1{    font-size:20px;    margin:10px 0;}.info{    font-size:12px;    line-height:1.5;    opacity:0.9;}/* ===== Animation ===== */@keyframes pulse{    0%{        transform:scale(1);        box-shadow:0 0 8px rgba(26,167,255,0.5);    }    100%{        transform:scale(1.1);        box-shadow:0 0 20px rgba(26,167,255,1);    }}</style></head><body><div class="screen">    <div class="logo">        <div class="cloud">            <div class="phone"></div>        </div>    </div>    <h1>Sportzfy tv By Sany Ahmed Raaz</h1>    <div class="info">        APP Ver.: 2.0<br>        Last Update 16/04/26<br>        UI Ver.: 1.0<br><br>        © 2025–2026 Sports Lover.<br>        All rights reserved.    </div></div></body></html>
